kind = "web"
previewPath = "/"
title = "Kalasutraa"
version = "1.0.0"
id = "artifacts/kalasutraa"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25647

[services.development]
run = "pnpm --filter @workspace/kalasutraa run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kalasutraa", "run", "build" ]
serve = "static"
publicDir = "artifacts/kalasutraa/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25647"
BASE_PATH = "/"
