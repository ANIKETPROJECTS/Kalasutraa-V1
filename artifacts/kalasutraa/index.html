<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Kalasutraa — Heritage Indian Art</title>
    <meta name="description" content="Kalasutraa — Museum-quality handcrafted Indian art by master artisans." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Kalasutraa" />
    <meta property="og:description" content="Museum-quality handcrafted Indian art by master artisans." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Kalasutraa" />
    <meta name="twitter:description" content="Museum-quality handcrafted Indian art by master artisans." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">

    <!-- Loading screen — all rules scoped to #loading-screen and its children only.
         NO global resets here; those would defeat Tailwind v4's @layer cascade. -->
    <style>
      @layer loading {
        #loading-screen {
          position: fixed;
          inset: 0;
          background: #F2EDE4;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          z-index: 9999;
          /* slide-out via transform — direction set by JS */
          transition: transform 1.1s cubic-bezier(0.76, 0, 0.24, 1);
          overflow: hidden;
          will-change: transform;
        }
        #loading-screen.slide-out {
          pointer-events: none;
        }
        .loader-mandala {
          position: relative;
          width: 140px;
          height: 140px;
          margin-bottom: 32px;
        }
        .loader-wheel {
          width: 100%;
          height: 100%;
          object-fit: contain;
          /* warm light-brown tint */
          filter: sepia(0.6) saturate(1.8) hue-rotate(358deg) brightness(0.78);
          animation: loaderSpinCW 7s linear infinite;
          transform-origin: center center;
        }
        @keyframes loaderSpinCW { to { transform: rotate(360deg); } }
        .loader-wordmark {
          font-family: 'IM Fell English', Georgia, serif;
          color: #2C1A0E;
          letter-spacing: 0.45em;
          font-size: 2rem;
          text-transform: uppercase;
          margin-bottom: 10px;
          font-weight: 400;
          text-shadow: 0 1px 2px rgba(44,26,14,0.12);
        }
        .loader-tagline {
          font-family: 'IM Fell English', Georgia, serif;
          color: #8B5C2A;
          font-size: 0.78rem;
          letter-spacing: 0.38em;
          text-transform: uppercase;
          margin-bottom: 38px;
          font-style: italic;
          opacity: 0.85;
        }
        .loader-bar-wrap {
          width: 140px;
          height: 1px;
          background: rgba(122,78,45,0.18);
          margin-top: 8px;
          position: relative;
          overflow: hidden;
        }
        .loader-bar {
          position: absolute;
          top: 0; left: 0;
          height: 100%;
          background: linear-gradient(90deg, transparent, #8B5C2A, transparent);
          width: 60%;
          animation: loaderBarSweep 1.8s ease-in-out infinite;
        }
        @keyframes loaderBarSweep {
          from { transform: translateX(-100%); }
          to   { transform: translateX(300%);  }
        }
        .loader-glow {
          position: absolute;
          inset: 0;
          background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(122,78,45,0.07) 0%, transparent 70%);
          pointer-events: none;
        }
      }
    </style>
  </head>
  <body>
    <!-- Loading screen (fades out once React paints) -->
    <div id="loading-screen">
      <div class="loader-glow"></div>
      <div class="loader-mandala">
        <img class="loader-wheel" src="/images/wheel-loader-nobg.png" alt="Kalasutraa wheel" />
      </div>
      <div class="loader-wordmark">Kalasutraa</div>
      <div class="loader-tagline">Where Heritage Breathes</div>
      <div class="loader-bar-wrap"><div class="loader-bar"></div></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      var _loaderHidden = false;
      var _loaderStart = Date.now();
      var MIN_DISPLAY = 1500; // ms — minimum time the loader stays visible

      function _hideLoader() {
        if (_loaderHidden) return;
        var elapsed = Date.now() - _loaderStart;
        var remaining = Math.max(0, MIN_DISPLAY - elapsed);
        setTimeout(function () {
          if (_loaderHidden) return;
          _loaderHidden = true;
          var el = document.getElementById('loading-screen');
          if (!el) return;
          // pick a random slide direction
          var dirs = [
            'translateY(-105vh)',
            'translateY(105vh)',
            'translateX(-105vw)',
            'translateX(105vw)'
          ];
          var dir = dirs[Math.floor(Math.random() * dirs.length)];
          el.style.transform = dir;
          el.classList.add('slide-out');
          setTimeout(function () { el.style.display = 'none'; }, 1150);
        }, remaining);
      }

      // hard cap: 7 s in case load event never fires
      setTimeout(_hideLoader, 7000);
      window.addEventListener('load', _hideLoader);
      window.__kalasutraa_ready = _hideLoader;
    </script>
  </body>
</html>
