<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Kalasutraa — Heritage Indian Art</title>
    <meta name="description" content="Kalasutraa — Museum-quality handcrafted Indian art by master artisans." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Kalasutraa" />
    <meta property="og:description" content="Museum-quality handcrafted Indian art by master artisans." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Kalasutraa" />
    <meta name="twitter:description" content="Museum-quality handcrafted Indian art by master artisans." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">

    <!-- Loading screen — all rules scoped to #loading-screen and its children only.
         NO global resets here; those would defeat Tailwind v4's @layer cascade. -->
    <style>
      @layer loading {
        #loading-screen {
          position: fixed;
          inset: 0;
          background: #1a0e08;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          z-index: 9999;
          opacity: 1;
          transition: opacity 0.9s cubic-bezier(0.4, 0, 0.2, 1);
          overflow: hidden;
        }
        #loading-screen.fade-out {
          opacity: 0;
          pointer-events: none;
        }
        .loader-mandala {
          position: relative;
          width: 120px;
          height: 120px;
          margin-bottom: 32px;
        }
        .loader-wheel {
          width: 100%;
          height: 100%;
          object-fit: contain;
          filter: sepia(1) saturate(2.5) hue-rotate(5deg) brightness(1.15);
          animation: loaderSpinCW 6s linear infinite;
          transform-origin: center center;
        }
        @keyframes loaderSpinCW { to { transform: rotate(360deg); } }
        .loader-wordmark {
          font-family: 'IM Fell English', Georgia, serif;
          color: #F5F0E8;
          letter-spacing: 0.3em;
          font-size: 1.35rem;
          text-transform: uppercase;
          margin-bottom: 10px;
        }
        .loader-tagline {
          font-family: Georgia, serif;
          color: #B8762A;
          font-size: 0.62rem;
          letter-spacing: 0.28em;
          text-transform: uppercase;
          margin-bottom: 36px;
          font-style: italic;
        }
        .loader-bar-wrap {
          width: 120px;
          height: 1px;
          background: rgba(184,118,42,0.18);
          margin-top: 8px;
          position: relative;
          overflow: hidden;
        }
        .loader-bar {
          position: absolute;
          top: 0; left: 0;
          height: 100%;
          background: linear-gradient(90deg, transparent, #B8762A, transparent);
          width: 60%;
          animation: loaderBarSweep 1.6s ease-in-out infinite;
        }
        @keyframes loaderBarSweep {
          from { transform: translateX(-100%); }
          to   { transform: translateX(300%);  }
        }
        .loader-glow {
          position: absolute;
          inset: 0;
          background: radial-gradient(ellipse 60% 50% at 50% 60%, rgba(184,118,42,0.08) 0%, transparent 70%);
          pointer-events: none;
        }
      }
    </style>
  </head>
  <body>
    <!-- Loading screen (fades out once React paints) -->
    <div id="loading-screen">
      <div class="loader-glow"></div>
      <div class="loader-mandala">
        <img class="loader-wheel" src="/images/wheel-loader-nobg.png" alt="Kalasutraa wheel" />
      </div>
      <div class="loader-wordmark">Kalasutraa</div>
      <div class="loader-tagline">Where Heritage Breathes</div>
      <div class="loader-bar-wrap"><div class="loader-bar"></div></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      var _loaderHidden = false;
      function _hideLoader() {
        if (_loaderHidden) return;
        _loaderHidden = true;
        var el = document.getElementById('loading-screen');
        if (!el) return;
        setTimeout(function () {
          el.classList.add('fade-out');
          setTimeout(function () { el.style.display = 'none'; }, 950);
        }, 200);
      }
      setTimeout(_hideLoader, 4000);
      window.addEventListener('load', function () { setTimeout(_hideLoader, 100); });
      window.__kalasutraa_ready = _hideLoader;
    </script>
  </body>
</html>
